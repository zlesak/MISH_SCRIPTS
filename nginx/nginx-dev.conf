events {
    worker_connections 1024;
}

http {
    client_max_body_size 100M;

    map $http_x_forwarded_host $effective_forwarded_host {
        default $http_x_forwarded_host;
        ""      $host;
    }
    map $http_x_forwarded_port $effective_forwarded_port {
        default $http_x_forwarded_port;
        ""      $server_port;
    }
    map $http_x_forwarded_proto $effective_forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    upstream vaadin_upstream {
        server vaadin-frontend:8081;
    }

    upstream kotlin_backend {
        server kotlin-backend:8050;
    }

    server {
        listen 80;

        location /api/ {
            proxy_pass http://kotlin_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $effective_forwarded_host;
            proxy_set_header X-Forwarded-Port $effective_forwarded_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $effective_forwarded_proto;
        }

        location /auth/ {
            proxy_pass http://mock-oidc:8080/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $effective_forwarded_host;
            proxy_set_header X-Forwarded-Port $effective_forwarded_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $effective_forwarded_proto;
        }

        # OAuth2 endpoints - explicitly route to frontend
        location ~ ^/(login|oauth2)/ {
            proxy_pass http://vaadin_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $effective_forwarded_host;
            proxy_set_header X-Forwarded-Port $effective_forwarded_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $effective_forwarded_proto;
        }

        # Vaadin WebSocket push endpoint
        location /VAADIN/push {
            proxy_pass http://vaadin_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $effective_forwarded_host;
            proxy_set_header X-Forwarded-Port $effective_forwarded_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $effective_forwarded_proto;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
        location / {
            proxy_pass http://vaadin_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $effective_forwarded_host;
            proxy_set_header X-Forwarded-Port $effective_forwarded_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $effective_forwarded_proto;
        }
    }
}
